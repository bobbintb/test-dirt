[package]
name = "dirt"
version = "0.1.0"
edition = "2021"

# Assuming license is inherited from workspace or defined elsewhere.
# If not, it should be:
# license = "MIT OR Apache-2.0"
license.workspace = true # Keep if workspace is used

[dependencies]
dirt-common = { path = "../dirt-common", features = ["user"] } # Ensure this path

anyhow = { workspace = true, default-features = true }
aya = { workspace = true }
aya-log = { workspace = true }
clap = { workspace = true, features = ["derive"] } # Added from previous steps, ensure it's here
chrono = { workspace = true, features = ["serde"] } # Added from previous steps
daemonize = { workspace = true } # Added from previous steps
env_logger = { workspace = true }
libc = { workspace = true }
log = { workspace = true }
serde = { workspace = true, features = ["derive"] } # Added from previous steps
serde_json = { workspace = true } # Added from previous steps
tokio = { workspace = true, features = [
    "macros",
    "rt",
    "rt-multi-thread",
    "net",
    "signal",
] }

[build-dependencies]
anyhow = { workspace = true }
aya-build = { workspace = true }
# The comment about dirt-ebpf dependency is kept as is from the read_files output.
dirt-ebpf = { path = "../dirt-ebpf" }

[[bin]]
name = "dirt"
path = "src/main.rs"
