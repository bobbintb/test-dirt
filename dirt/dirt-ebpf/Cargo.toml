[package]
name = "dirt-ebpf"
version = "0.1.0"
edition = "2021"

[dependencies]
dirt-common = { path = "../dirt-common" }

aya-ebpf = { workspace = true, features = ["vmlinux"] }
aya-log-ebpf = { workspace = true }

[build-dependencies]
which = { workspace = true }

[lib]
name = "dirt_ebpf" # Library name, can be different from package name
path = "src/lib.rs"
crate-type = ["dylib"]

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
