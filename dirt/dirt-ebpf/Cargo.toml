[package]
name = "dirt-ebpf"
version = "0.1.0"
edition = "2021"
publish = false # Keep publish setting as is

[dependencies]
aya-ebpf = { git = "https://github.com/aya-rs/aya", features = ["btf"] }
aya-log-ebpf = { git = "https://github.com/aya-rs/aya" }
dirt-common = { path = "../dirt-common" } # Ensure this path

# Assuming no other direct dependencies are needed for dirt-ebpf based on previous steps.
# If using workspace inheritance for aya-ebpf etc., that would look like:
# aya-ebpf = { workspace = true, features = ["btf"] }
# aya-log-ebpf = { workspace = true }
# For now, keeping the explicit git dependencies as read.

[[bin]]
name = "dirt" # The eBPF binary output name
path = "src/main.rs"

[profile.dev]
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = false
lto = true
panic = "abort"
incremental = false
codegen-units = 1
rpath = false

[profile.release]
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = false
lto = true
panic = "abort"
incremental = false
codegen-units = 1
rpath = false

[workspace] # Keep empty workspace section as is from read_files output
